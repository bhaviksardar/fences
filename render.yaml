services:
  - type: web
    name: fences-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fences-db
          property: connectionString

databases:
  - name: fences-db
    plan: free